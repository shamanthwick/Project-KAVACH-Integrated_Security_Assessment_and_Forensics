<svg xmlns="http://www.w3.org/2000/svg" width="940" height="360" viewBox="0 0 940 360">
  <style>
    .box{fill:#fff4e6;stroke:#9a5b00;stroke-width:2;rx:10}
    .risk{fill:#ffe3e3;stroke:#b42318;stroke-width:2;rx:10}
    .text{font-family:Segoe UI,Arial,sans-serif;font-size:15px;fill:#1f2937}
    .title{font-family:Segoe UI,Arial,sans-serif;font-size:22px;font-weight:700;fill:#111827}
    .small{font-family:Segoe UI,Arial,sans-serif;font-size:12px;fill:#4b5563}
    .line{stroke:#374151;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <text x="30" y="36" class="title">Before: Flat Segment With Weak Egress Controls</text>
  <rect x="40" y="90" width="160" height="70" class="risk"/>
  <text x="63" y="120" class="text">User Workstation</text>
  <text x="63" y="143" class="small">malware, FTP, scans</text>
  <rect x="285" y="65" width="160" height="70" class="box"/>
  <text x="322" y="96" class="text">Domain Controller</text>
  <text x="323" y="119" class="small">SMB/LDAP/Kerberos</text>
  <rect x="285" y="165" width="160" height="70" class="risk"/>
  <text x="325" y="196" class="text">Legacy FTP</text>
  <text x="308" y="219" class="small">cleartext USER/PASS</text>
  <rect x="530" y="90" width="160" height="70" class="box"/>
  <text x="568" y="120" class="text">Basic Firewall</text>
  <text x="552" y="143" class="small">port-based allow rules</text>
  <rect x="750" y="90" width="160" height="70" class="risk"/>
  <text x="803" y="120" class="text">Internet</text>
  <text x="774" y="143" class="small">C2, payloads, exfil</text>
  <rect x="285" y="265" width="160" height="55" class="box"/>
  <text x="334" y="297" class="text">DNS</text>
  <line x1="200" y1="118" x2="285" y2="100" class="line"/>
  <line x1="200" y1="132" x2="285" y2="195" class="line"/>
  <line x1="200" y1="145" x2="285" y2="290" class="line"/>
  <line x1="445" y1="100" x2="530" y2="115" class="line"/>
  <line x1="445" y1="200" x2="530" y2="132" class="line"/>
  <line x1="690" y1="125" x2="750" y2="125" class="line"/>
  <text x="44" y="335" class="small">Observed risks: direct outbound C2, HTTP over 443, FTP credentials, flat DC access, weak scan detection.</text>
</svg>
